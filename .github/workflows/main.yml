name: run-tests

on:
  push:
    branches: [main, develop, upgrade-api-coverage]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
        laravel: ["12.*", "13.*"]
        dependency-version: [prefer-stable]
        include:
          - laravel: "12.*"
            testbench: "^10.0"
          - laravel: "13.*"
            testbench: "^11.0"

    name: "PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: xdebug

      - name: Install dependencies
        run: |
          composer require --dev \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-interaction --no-update
          composer update \
            --${{ matrix.dependency-version }} \
            --prefer-dist --no-interaction

      - name: Check code style
        run: ./vendor/bin/pint --test

      - name: Run static analysis
        run: ./vendor/bin/phpstan analyse --memory-limit=256M

      - name: Run tests with coverage
        run: ./vendor/bin/pest --coverage --min=80 --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
